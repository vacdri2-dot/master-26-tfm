name: Terraform Pipeline

on:
  pull_request:
    branches: [staging]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  push:
    branches: [staging]
    paths:
      - "infra/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

env:
  ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
  ARM_USE_OIDC: true

  TF_VAR_subscription_id: ${{ vars.TF_VAR_SUBSCRIPTION_ID }}
  TF_VAR_location: ${{ vars.TF_VAR_LOCATION }}
  TF_VAR_environment: ${{ vars.TF_VAR_ENVIRONMENT }}
  TF_VAR_project_name: ${{ vars.TF_VAR_PROJECT_NAME }}
  TF_VAR_resource_group_name: ${{ vars.TF_VAR_RESOURCE_GROUP_NAME }}
  TF_VAR_vnet_cidr: ${{ vars.TF_VAR_VNET_CIDR }}
  TF_VAR_subnet_cidrs: ${{ vars.TF_VAR_SUBNET_CIDRS }}
  TF_VAR_openai_subdomain_suffix: ${{ vars.TF_VAR_OPENAI_SUBDOMAIN_SUFFIX }}
  TF_VAR_acr_name_suffix: ${{ vars.TF_VAR_ACR_NAME_SUFFIX }}

jobs:
  terraform:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Azure Login (OIDC)
        uses: azure/login@a457da9ea143d694b1b9c7c869ebb04ebe844ef5 # v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "~1.7"
          terraform_wrapper: false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TF_BACKEND_RESOURCE_GROUP }}" \
            -backend-config="storage_account_name=${{ vars.TF_BACKEND_STORAGE_ACCOUNT }}" \
            -backend-config="container_name=${{ vars.TF_BACKEND_CONTAINER }}" \
            -backend-config="key=${{ vars.TF_BACKEND_KEY }}" \
            -backend-config="use_azuread_auth=true"

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@90f302c255ef959cbfb4bd10581afecdb7ece3e6 # v4
        with:
          tflint_version: v0.50.0

      - name: TFLint
        run: |
          tflint --init
          tflint --recursive -f compact

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -no-color -input=false -out=tfplan

      - name: Post Plan as PR Comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          {
            echo "### Terraform Plan"
            echo
            echo '<details><summary>Click to expand plan output</summary>'
            echo
            echo '```terraform'
            terraform show -no-color tfplan
            echo '```'
            echo
            echo '</details>'
          } > plan_result.md
          gh pr comment ${{ github.event.pull_request.number }} --body-file plan_result.md

      - name: Terraform Apply
        if: github.ref == 'refs/heads/staging' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
        run: terraform apply -auto-approve -input=false tfplan
