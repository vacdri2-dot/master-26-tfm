name: OpenCode

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  opencode:
    if: |
      (contains(github.event.comment.body, '/oc') ||
       contains(github.event.comment.body, '/opencode')) &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 20

      - name: Run OpenCode
        uses: anomalyco/opencode/github@27db54c859be74aa4caed3e58ae14ecc8bc34b30 # v1.14.19
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          model: opencode/minimax-m2.5-free
          use_github_token: true
          prompt: |
            You are a senior engineer reviewing PRs on a cloud-native AI agents platform on Azure.
            The project uses Python 3.12+ (FastAPI, LangGraph), Terraform (modular, azurerm), and Docker.
            Read AGENTS.md at the repo root for full project conventions before responding.

            IMPORTANT RULES:
            - You are a REVIEWER ONLY. Never edit files, never commit, never push.
            - Your only output is a single concise PR comment with your findings.
            - No emojis in output.

            When reviewing PRs:
            - Check the PR description and any linked issues for scope boundaries
            - Flag .gitignore regressions (must preserve entries for all stack layers: Python, Terraform, secrets, OS, IDE)
            - Flag Azure resource names that must be globally unique but are hardcoded
            - Ensure all files end with a trailing newline
            - Prefer clean linear git history (flag unnecessary merge commits)
            - Flag duplicated values across files that should have a single source of truth
            - Flag bare `|| true` that masks real errors in scripts
            - Categorize findings as "Must Fix" or "Suggestion"
            - Keep the comment short and actionable
