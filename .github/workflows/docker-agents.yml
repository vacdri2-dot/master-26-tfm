name: Docker Agents Pipeline

on:
  push:
    branches:
      - staging
    paths:
      - "agents/**"

permissions:
  id-token: write
  contents: read

jobs:
  detect-changes:
    name: Detect Changed Agents
    runs-on: ubuntu-latest
    outputs:
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      rag: ${{ steps.filter.outputs.rag }}
      code: ${{ steps.filter.outputs.code }}
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Detect changed agent paths
        id: filter
        uses: dorny/paths-filter@de22dfa110eec625c4046101fe75b6ff187c295c # v3.3.5
        with:
          filters: |
            orchestrator:
              - "agents/orchestrator/**"
            rag:
              - "agents/rag/**"
            code:
              - "agents/code/**"

      - name: Build changed-agent matrix
        id: set-matrix
        env:
          ORCHESTRATOR_CHANGED: ${{ steps.filter.outputs.orchestrator }}
          RAG_CHANGED: ${{ steps.filter.outputs.rag }}
          CODE_CHANGED: ${{ steps.filter.outputs.code }}
        run: |
          entries=()

          if [[ "${ORCHESTRATOR_CHANGED}" == "true" ]]; then
            entries+=('{"agent":"orchestrator","package":"orchestrator","agent_dir":"orchestrator","module":"orchestrator","image":"orchestrator"}')
          fi

          if [[ "${RAG_CHANGED}" == "true" ]]; then
            entries+=('{"agent":"rag","package":"rag","agent_dir":"rag","module":"rag","image":"rag"}')
          fi

          if [[ "${CODE_CHANGED}" == "true" ]]; then
            entries+=('{"agent":"code","package":"code-agent","agent_dir":"code","module":"code_agent","image":"code-agent"}')
          fi

          if [[ "${#entries[@]}" -eq 0 ]]; then
            matrix='[]'
          else
            printf -v matrix '[%s]' "$(IFS=,; echo "${entries[*]}")"
          fi

          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  build-and-push:
    name: Build and Push ${{ matrix.image }}
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.detect-changes.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Azure login with OIDC
        uses: azure/login@eec3c95657c1536435858eda1f3ff5437fee8474 # v2.3.0
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Get ACR access token
        id: acr-token
        run: |
          token="$(az acr login --name "${{ vars.ACR_NAME }}" --expose-token --output tsv --query accessToken)"
          echo "::add-mask::${token}"
          echo "access_token=${token}" >> "${GITHUB_OUTPUT}"

      - name: Login to Azure Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ${{ vars.ACR_NAME }}.azurecr.io
          username: 00000000-0000-0000-0000-000000000000
          password: ${{ steps.acr-token.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build and push image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            PACKAGE=${{ matrix.package }}
            AGENT_DIR=${{ matrix.agent_dir }}
            MODULE=${{ matrix.module }}
          platforms: linux/amd64
          push: true
          tags: |
            ${{ vars.ACR_NAME }}.azurecr.io/${{ matrix.image }}:${{ github.sha }}
            ${{ vars.ACR_NAME }}.azurecr.io/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
