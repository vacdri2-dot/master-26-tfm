name: Azure OIDC Validate

on:
  pull_request:
    branches: [staging, main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  validate-oidc-login:
    name: Validate Azure OIDC Login
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Azure login with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Show Azure account context
        run: az account show --output json

      - name: Verify target resource group access
        run: az group show --name ${{ vars.AZURE_RESOURCE_GROUP }} --output json
